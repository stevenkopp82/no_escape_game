<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1a1a1a"/>

  <!-- Skull cranium -->
  <ellipse cx="16" cy="13" rx="10" ry="10" fill="#c8c8c8"/>

  <!-- Jaw -->
  <rect x="9" y="19" width="14" height="7" rx="2" fill="#c8c8c8"/>

  <!-- Teeth gaps (dark lines between teeth) -->
  <rect x="12" y="20" width="1.5" height="6" fill="#1a1a1a"/>
  <rect x="15.25" y="20" width="1.5" height="6" fill="#1a1a1a"/>
  <rect x="18.5" y="20" width="1.5" height="6" fill="#1a1a1a"/>

  <!-- Bottom jaw outline -->
  <rect x="9" y="25" width="14" height="1.5" rx="1" fill="#1a1a1a"/>

  <!-- Left eye socket -->
  <ellipse cx="12" cy="13" rx="3.5" ry="3.5" fill="#1a1a1a"/>

  <!-- Right eye socket -->
  <ellipse cx="20" cy="13" rx="3.5" ry="3.5" fill="#1a1a1a"/>

  <!-- Nose cavity -->
  <path d="M14.5 17 L16 15 L17.5 17 Z" fill="#1a1a1a"/>
</svg>
